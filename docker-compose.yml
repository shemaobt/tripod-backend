services:
  gcp-secrets:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:alpine
    container_name: tripod_backend_gcp_secrets
    environment:
      SECRETS_PROJECT_ID: ${SECRETS_PROJECT_ID:-shemaobt-secrets}
    volumes:
      - gcp_secrets_env:/secrets
      - ${HOME}/.config/gcloud:/host-gcloud:ro
    command:
      - sh
      - -c
      - |
        cp -r /host-gcloud /tmp/gcloud
        export CLOUDSDK_CONFIG=/tmp/gcloud
        DB_URL=$$(gcloud secrets versions access latest --secret=tripod_backend_neon_database_url_local --project=$$SECRETS_PROJECT_ID | tr -d '\n')
        JWT=$$(gcloud secrets versions access latest --secret=tripod_backend_jwt_secret --project=$$SECRETS_PROJECT_ID | tr -d '\n')
        QDRANT_URL=$$(gcloud secrets versions access latest --secret=tripod_backend_qdrant_url --project=$$SECRETS_PROJECT_ID | tr -d '\n')
        QDRANT_API_KEY=$$(gcloud secrets versions access latest --secret=tripod_backend_qdrant_api_key --project=$$SECRETS_PROJECT_ID | tr -d '\n')
        GOOGLE_API_KEY=$$(gcloud secrets versions access latest --secret=tripod_backend_google_api_key --project=$$SECRETS_PROJECT_ID | tr -d '\n')
        printf "DATABASE_URL='%s'\nJWT_SECRET_KEY='%s'\nQDRANT_URL='%s'\nQDRANT_API_KEY='%s'\nGOOGLE_API_KEY='%s'\n" "$$DB_URL" "$$JWT" "$$QDRANT_URL" "$$QDRANT_API_KEY" "$$GOOGLE_API_KEY" > /secrets/.env
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: tripod_backend
    container_name: tripod_backend
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
      - backend_venv:/opt/venv
      - tf_data:/root/text-fabric-data
      - gcp_secrets_env:/run/secrets:ro
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      gcp-secrets:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; r=urllib.request.urlopen('http://127.0.0.1:8000/health'); assert r.getcode()==200" ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s
    command: >
      sh -c "set -a && . /run/secrets/.env && set +a && uv run alembic upgrade head && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  bhsa-fetcher:
    build:
      context: .
      dockerfile: Dockerfile.bhsa
    image: tripod_bhsa
    container_name: tripod_bhsa_fetcher
    volumes:
      - tf_data:/root/text-fabric-data
    restart: "no"
    profiles:
      - bhsa

  bhsa-load:
    image: python:3.11-slim
    container_name: tripod_bhsa_load
    depends_on:
      backend:
        condition: service_healthy
      bhsa-fetcher:
        condition: service_completed_successfully
    restart: "no"
    command: [ "python", "-c", "import urllib.request; req=urllib.request.Request('http://backend:8000/api/bhsa/load', method='POST'); urllib.request.urlopen(req)" ]
    profiles:
      - bhsa

  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: tripod_backend
    container_name: tripod_backend_worker
    volumes:
      - ./:/app
      - backend_venv:/opt/venv
      - tf_data:/root/text-fabric-data
      - gcp_secrets_env:/run/secrets:ro
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      gcp-secrets:
        condition: service_completed_successfully
      backend:
        condition: service_healthy
    command: >
      sh -c "set -a && . /run/secrets/.env && set +a && uv run procrastinate --app=app.core.task_queue.get_task_app worker --queues=bcd_generation"
    profiles:
      - worker

  lint:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: tripod_backend
    container_name: tripod_backend_lint
    volumes:
      - ./:/app
      - backend_venv:/opt/venv
    command: sh -c "uv run ruff check . && uv run ruff format --check ."
    profiles:
      - lint

volumes:
  backend_venv:
  gcp_secrets_env:
  tf_data:
